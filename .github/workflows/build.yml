name: Unzip and Build APKon:push:branches:- mainworkflow_dispatch:jobs:build:runs-on: ubuntu-lateststeps:- name: Checkout repouses: actions/checkout@v4- name: Check and Extract zip archiverun: |if test -f amazon-invoice-merger.zip; thenecho "Zip file found! Extracting..."unzip -o amazon-invoice-merger.zip -d .rm amazon-invoice-merger.zipelseecho "No zip file found. Proceeding with existing repository files."fi- name: Set up JDK 17uses: actions/setup-java@v4with:distribution: temurinjava-version: '17'- name: Grant execute permission for gradlewrun: |if test -f gradlew; thenchmod +x gradlewelseecho "Error: gradlew file not found! Make sure it is inside your project folder."exit 1fi- name: Build debug APKrun: |if test -d app; then./gradlew assembleDebugelseecho "Error: 'app' directory not found. Check your zip file folder structure!"exit 1fi- name: Commit extracted files back to GitHubrun: |git config --global user.name "github-actions[bot]"git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"git add .if git diff --staged --quiet; thenecho "No new files to commit."elsegit commit -m "Automatically unzipped mobile project folders"git pushfi- name: Upload APK artifactuses: actions/upload-artifact@v4with:name: app-debug-apkpath: app/build/outputs/apk/debug/app-debug.apk
