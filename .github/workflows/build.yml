name: "Unzip and Build APK"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repo"
        uses: "actions/checkout@v4"

      - name: "Check and Extract zip archive"
        run: |
          if [ -f "amazon-invoice-merger.zip" ]; then unzip -o "amazon-invoice-merger.zip" -d .; rm "amazon-invoice-merger.zip"; else echo "No zip found"; fi

      - name: "Set up JDK 17"
        uses: "actions/setup-java@v4"
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "Grant execute permission for gradlew"
        run: |
          if [ -f "gradlew" ]; then chmod +x gradlew; else echo "gradlew missing"; exit 1; fi

      - name: "Build debug APK"
        run: |
          if [ -d "app" ]; then ./gradlew assembleDebug; else echo "app folder missing"; exit 1; fi

      - name: "Commit extracted files back to GitHub"
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git diff --staged --quiet || (git commit -m "Unzipped mobile upload" && git push)

      - name: "Upload APK artifact"
        uses: "actions/upload-artifact@v4"
        with:
          name: "app-debug-apk"
          path: "app/build/outputs/apk/debug/app-debug.apk"
